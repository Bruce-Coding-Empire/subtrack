services:
  - type: web
    runtime: node
    name: subtrack-api
    plan: free
    buildCommand: npm ci && npm run build --workspace=apps/api
    startCommand: npm run start:prod --workspace=apps/api
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: WEB_APP_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REFRESH_TOKEN_MAX_AGE_MS
        value: "604800000"
      - key: EXCHANGE_RATE_API_URL
        value: https://open.er-api.com/v6
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
